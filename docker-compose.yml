version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hw4
    ports:
      - "5432:5432"
    volumes:
      - hw4_pgdata:/var/lib/postgresql/data

volumes:
  hw4_pgdata:
